{% extends 'tracker/base.html' %}

{% block content %}
<div class="row">
    <div class="col-lg-5 col-md-6 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">Добавить новую заправку</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <hr>
                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">Сохранить заправку</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 text-muted mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-7 col-md-6">
        <div class="card shadow-sm overflow-hidden">
            <div class="card-header bg-dark text-white py-3">
                <h6 class="mb-0">Кликните на карту, чтобы выбрать АЗС</h6>
            </div>
            <div id="map" style="height: 600px; width: 100%;"></div>
        </div>
    </div>
</div>

<script type="text/javascript">
    ymaps.ready(init);
    var myMap, myPlacemark;

    function init() {
        // Создаем карту
        myMap = new ymaps.Map("map", {
            center: [56.8389, 60.6057], // Екатеринбург
            zoom: 11,
            controls: ['zoomControl', 'searchControl', 'fullscreenControl']
        });

        // Настройка поиска только по адресам (бесплатно)
        var searchControl = myMap.controls.get('searchControl');
        searchControl.options.set({ provider: 'yandex#map', noSuggestPanel: true });

        // Функция обновления метки и данных в форме
        function updateMarker(coords) {
            if (myPlacemark) {
                myPlacemark.geometry.setCoordinates(coords);
            } else {
                myPlacemark = new ymaps.Placemark(coords, {}, {
                    preset: 'islands#redIcon',
                    draggable: true
                });
                myMap.geoObjects.add(myPlacemark);

                // Если пользователь перетащит метку
                myPlacemark.events.add('dragend', function() {
                    updateInputs(myPlacemark.geometry.getCoordinates());
                });
            }
            updateInputs(coords);
        }

        function updateInputs(coords) {
            document.getElementById('id_latitude').value = coords[0].toFixed(6);
            document.getElementById('id_longitude').value = coords[1].toFixed(6);
        }

        // Клик по карте
        myMap.events.add('click', function (e) {
            var coords = e.get('coords');
            updateMarker(coords);
        });

        // Если выбрали результат в поиске
        searchControl.events.add('resultselect', function (e) {
            var index = e.get('index');
            searchControl.getResult(index).then(function (res) {
                var coords = res.geometry.getCoordinates();
                updateMarker(coords);
            });
        });
    }
</script>
{% endblock %}
