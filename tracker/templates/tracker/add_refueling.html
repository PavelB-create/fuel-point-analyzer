{% extends 'tracker/base.html' %}

{% block content %}
<div class="row mt-2">
    <div class="col-lg-5 col-md-6 mb-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">Новая заправка</h5>
            </div>
            <div class="card-body">
                <form method="post" id="refuel-form">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <hr>
                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">Сохранить</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 text-muted mt-2">Назад</a>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-7 col-md-6">
        <div class="card shadow border-0 overflow-hidden">
            <div class="card-header bg-dark text-white py-3">
                <h6 class="mb-0">Кликните на карту для выбора АЗС</h6>
            </div>
            <div id="map" style="height: 600px; width: 100%;"></div>
        </div>
    </div>
</div>

<script>
    // Карта 2ГИС
    const map = new mapgl.Map('map', {
        center: [60.6057, 56.8389],
        zoom: 13,
        key: '{{ dg_key }}',
    });

    let marker;

    // Клик по карте
    map.on('click', (e) => {
        const coords = e.lngLat; // [Lon, Lat]

        if (marker) {
            marker.setCoordinates(coords);
        } else {
            marker = new mapgl.Marker(map, {
                coordinates: coords,
            });
        }

        // Заполняем поля формы (Lat - coords[1], Lon - coords[0])
        document.getElementById('id_latitude').value = coords[1].toFixed(6);
        document.getElementById('id_longitude').value = coords[0].toFixed(6);
    });
</script>
{% endblock %}
