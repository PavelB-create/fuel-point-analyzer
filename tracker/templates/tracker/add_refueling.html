{% extends 'tracker/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4>Новая заправка</h4></div>
            <div class="card-body">
                <form method="post" id="refuel-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Сохранить</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div id="map" style="height: 500px; border-radius: 10px; border: 2px solid #ccc;"></div>
    </div>
</div>

<script>
    var map = L.map('map').setView([55.75, 37.61], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker;

    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        if (marker) {
            marker.setLatLng(e.latlng);
        } else {
            marker = L.marker(e.latlng).addTo(map);
        }

        var latInput = document.getElementById('id_latitude');
        var lngInput = document.getElementById('id_longitude');

        if (latInput && lngInput) {
            latInput.value = lat.toFixed(6);
            lngInput.value = lng.toFixed(6);
            console.log("Координаты установлены: " + lat + ", " + lng);
        } else {
            alert("Ошибка: Поля координат не найдены в форме!");
        }
    });
</script>
{% endblock %}
