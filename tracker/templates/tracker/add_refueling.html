{% extends 'tracker/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4>Новая заправка</h4></div>
            <div class="card-body">
                <form method="post" id="refuel-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Сохранить</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div id="map" style="height: 500px; border-radius: 10px; border: 2px solid #ccc;"></div>
    </div>
</div>

<script type="text/javascript">
    ymaps.ready(init);
    var myMap, myPlacemark;

    function init() {
        myMap = new ymaps.Map("map", {
            center: [56.8389, 60.6057],
            zoom: 11
        });

        // Поиск только по адресам
        var searchControl = new ymaps.control.SearchControl({
            options: {
                provider: 'yandex#map',
                noPlacemark: true
            }
        });
        myMap.controls.add(searchControl);

        // Клик по результату поиска
        searchControl.events.add('resultselect', function (e) {
            var index = e.get('index');
            searchControl.getResult(index).then(function (res) {
                var coords = res.geometry.getCoordinates();
                updateMarker(coords);
            });
        });

        // Клик по карте
        myMap.events.add('click', function (e) {
            var coords = e.get('coords');
            updateMarker(coords);
        });

        function updateMarker(coords) {
            if (myPlacemark) {
                myPlacemark.geometry.setCoordinates(coords);
            } else {
                myPlacemark = new ymaps.Placemark(coords, {}, {preset: 'islands#redIcon'});
                myMap.geoObjects.add(myPlacemark);
            }
            document.getElementById('id_latitude').value = coords[0].toFixed(6);
            document.getElementById('id_longitude').value = coords[1].toFixed(6);
        }
    }
</script>
{% endblock %}
