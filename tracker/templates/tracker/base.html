<!DOCTYPE html>
<html lang="ru">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://api-maps.yandex.ru/2.1/?apikey=02116524-4164-4b34-8a27-a8be2a5a885a&lang=ru_RU" type="text/javascript"></script>
<head>
    <meta charset="UTF-8">
    <title>FuelPoint Analyzer</title>
    <!-- Подключаем Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    /* Анимация появления карточек */
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: fadeIn 0.8s ease-out;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    /* Стиль кнопок */
    .btn-primary {
        border-radius: 20px;
        padding: 10px 25px;
        font-weight: bold;
    }
</style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">FuelPoint Analyzer</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
